name: Update votes & deploy dashboard

on:
  schedule:
    - cron: "17 6,18 * * *"   # twice daily, 06:17 & 18:17 UTC
  workflow_dispatch:
  push:
    branches: [main, "claude/**"]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-and-deploy
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}   # branch tip (default branch on schedule/dispatch)

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch new roll-call votes
        if: github.event_name != 'push'
        run: |
          python scripts/fetch_votes.py
          python scripts/score_risk.py

      - name: Commit updated data
        id: commit
        if: github.event_name != 'push'
        run: |
          if git diff --quiet -- data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new votes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "data: refresh Salinas roll-call votes ($(date -u +%F))"
            git push origin HEAD:"$GITHUB_REF_NAME"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy-pages:
    needs: update-data
    # deploy on every push to main, and on schedule/dispatch runs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}   # picks up the data commit from the update job, if any

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Assemble site
        run: |
          python scripts/score_risk.py   # re-score so rubric edits deploy without a data commit
          mkdir -p _site/data
          cp docs/index.html _site/
          cp data/salinas_votes.json data/salinas_votes.csv _site/data/
          cp data/salinas_votes_scored.json data/salinas_votes_scored.csv _site/data/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
