name: Update votes & deploy dashboard

on:
  schedule:
    - cron: "17 6,18 * * *"   # twice daily, 06:17 & 18:17 UTC
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: update-and-deploy
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}   # branch tip (default branch on schedule/dispatch)

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch new roll-call votes
        if: github.event_name != 'push'
        run: |
          python scripts/fetch_votes.py
          python scripts/score_risk.py

      - name: Commit updated data
        if: github.event_name != 'push'
        run: |
          if git diff --quiet -- data/; then
            echo "No new votes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/
            git commit -m "data: refresh Salinas roll-call votes ($(date -u +%F))"
            git push origin HEAD:"$GITHUB_REF_NAME"
          fi

  deploy-pages:
    needs: update-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}   # picks up the data commit from the update job, if any

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Assemble site
        run: |
          python scripts/score_risk.py   # re-score so rubric edits deploy without a data commit
          mkdir -p _site/data
          cp docs/index.html _site/index.html
          cp data/salinas_votes.json data/salinas_votes.csv _site/data/
          cp data/salinas_votes_scored.json data/salinas_votes_scored.csv _site/data/
          touch _site/.nojekyll

      # Publish by force-pushing the built site to the gh-pages branch.
      # (The Pages REST API rejects site creation by GITHUB_TOKEN, so the
      # actions/deploy-pages flow can't bootstrap itself; branch serving can.)
      - name: Publish to gh-pages
        run: |
          cd _site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
